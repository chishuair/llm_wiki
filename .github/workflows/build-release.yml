# Windows 离线安装包（法规库 + OCR sidecar + PDFium + docs）。
# 后续可改为 matrix 同时打 macOS / Linux，例如：
#   strategy:
#     matrix:
#       include:
#         - os: windows-latest
#         - os: macos-latest
#         - os: ubuntu-latest
# 各平台需分别准备 pdfium 与 paddleocr-sidecar，再调用对应 tauri target。
name: Build Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  uos-linux:
    name: UOS Linux x64 offline package
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust Linux
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux packaging tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            protobuf-compiler \
            libgl1 \
            libglib2.0-0 \
            libgomp1

      - name: Install npm dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Prepare bundled lawbase and docs
        shell: bash
        run: |
          mkdir -p resources/lawbase resources/docs
          if [ ! -f resources/lawbase/lawbase-pack.json ]; then
            cp lawbase-pack-full/lawbase-pack.json resources/lawbase/lawbase-pack.json
          fi
          if [ -f lawbase-pack-full/manifest.json ] && [ ! -f resources/lawbase/manifest.json ]; then
            cp lawbase-pack-full/manifest.json resources/lawbase/manifest.json
          fi
          if [ ! -f resources/docs/offline-help.md ]; then
            printf '%s\n' "AI Case Wiki offline help placeholder." > resources/docs/offline-help.md
          fi

      - name: Prepare Linux PDFium
        shell: bash
        run: ./scripts/fetch-pdfium.sh linux-x64

      - name: Install PaddleOCR build dependencies
        shell: bash
        run: |
          python -m pip install -U pip
          python -m pip install paddlepaddle paddleocr "paddlex[ocr-core]" pyinstaller pillow

      - name: Build PaddleOCR sidecar
        shell: bash
        run: |
          ./scripts/build-paddleocr-sidecar.sh
          test -x resources/ocr/paddleocr-sidecar

      - name: Warm OCR models and smoke test
        shell: bash
        run: |
          python - <<'PY'
          from PIL import Image, ImageDraw, ImageFont
          path = "ocr-smoke.png"
          image = Image.new("RGB", (900, 260), "white")
          draw = ImageDraw.Draw(image)
          try:
              font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf", 96)
          except Exception:
              font = ImageFont.load_default()
          draw.text((40, 70), "test 123", fill="black", font=font)
          image.save(path)
          PY

          sidecar="$(pwd)/resources/ocr/paddleocr-sidecar"
          set +e
          warm_output="$("$sidecar" "$(pwd)/ocr-smoke.png")"
          warm_exit=$?
          set -e
          if [ -n "$warm_output" ]; then
            echo "$warm_output"
          fi
          if [ "$warm_exit" -ne 0 ]; then
            echo "::warning::Initial OCR warm-up exited with code $warm_exit; continuing only if the model cache was created."
          fi

          models="resources/ocr/.paddlex/official_models"
          user_models="$HOME/.paddlex/official_models"
          if [ -d "$user_models" ] && [ ! -d "$models" ]; then
            mkdir -p resources/ocr/.paddlex
            cp -a "$user_models" "$models"
          fi
          test -d "$models"

          temp_home="$RUNNER_TEMP/ocr-empty-home"
          mkdir -p "$temp_home"
          set +e
          smoke_output="$(HOME="$temp_home" USERPROFILE="$temp_home" "$sidecar" "$(pwd)/ocr-smoke.png")"
          smoke_exit=$?
          set -e
          if [ -n "$smoke_output" ]; then
            SMOKE_OUTPUT="$smoke_output" python - <<'PY'
          import json
          import os
          json.loads(os.environ["SMOKE_OUTPUT"])
          PY
          else
            echo "::warning::OCR smoke test returned empty output; continuing because the model cache exists."
          fi
          if [ "$smoke_exit" -ne 0 ]; then
            echo "::warning::OCR smoke test exited with code $smoke_exit; continuing because the model cache exists."
          fi

      - name: Verify offline resources
        shell: bash
        run: |
          test -f resources/lawbase/lawbase-pack.json
          test -x resources/ocr/paddleocr-sidecar
          test -d resources/ocr/.paddlex/official_models
          test -f resources/pdfium/libpdfium.so
          test -d resources/docs

      - name: Build frontend
        shell: bash
        run: npm run build

      - name: Check Rust backend
        shell: bash
        run: cargo check --manifest-path src-tauri/Cargo.toml --target x86_64-unknown-linux-gnu

      - name: Build Tauri UOS package
        shell: bash
        env:
          CI: "true"
        run: npm run tauri build -- --target x86_64-unknown-linux-gnu --bundles deb,appimage

      - name: Collect UOS distributables
        shell: bash
        run: |
          mkdir -p artifacts
          cp -v src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb artifacts/ || true
          cp -v src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage artifacts/ || true
          test "$(find artifacts -type f | wc -l)" -gt 0
          ls -lh artifacts

      - name: Upload UOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-case-wiki-uos-linux-x64
          path: artifacts/*
          if-no-files-found: error

  windows:
    name: Windows x64 offline installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust MSVC
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install Windows packaging tools
        shell: pwsh
        run: |
          choco install nsis protoc -y --no-progress

      - name: Install npm dependencies
        shell: pwsh
        run: |
          if (Test-Path package-lock.json) {
            npm ci
          } else {
            npm install
          }

      - name: Prepare bundled lawbase and docs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources\lawbase | Out-Null
          New-Item -ItemType Directory -Force -Path resources\docs | Out-Null
          if (-not (Test-Path "resources\lawbase\lawbase-pack.json")) {
            Copy-Item "lawbase-pack-full\lawbase-pack.json" "resources\lawbase\lawbase-pack.json" -Force
          }
          if ((Test-Path "lawbase-pack-full\manifest.json") -and -not (Test-Path "resources\lawbase\manifest.json")) {
            Copy-Item "lawbase-pack-full\manifest.json" "resources\lawbase\manifest.json" -Force
          }
          if (-not (Test-Path "resources\docs\offline-help.md")) {
            "AI Case Wiki offline help placeholder." | Out-File "resources\docs\offline-help.md" -Encoding utf8
          }

      - name: Prepare Windows PDFium
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources\pdfium | Out-Null
          $archive = "$env:RUNNER_TEMP\pdfium-win-x64.tgz"
          $extractDir = "$env:RUNNER_TEMP\pdfium-win-x64"
          Invoke-WebRequest `
            -Uri "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz" `
            -OutFile $archive
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          tar -xzf $archive -C $extractDir
          Copy-Item "$extractDir\bin\pdfium.dll" "resources\pdfium\pdfium.dll" -Force
          if (-not (Test-Path "resources\pdfium\pdfium.dll")) {
            throw "Missing resources\pdfium\pdfium.dll"
          }

      - name: Install PaddleOCR build dependencies
        shell: pwsh
        run: |
          python -m pip install -U pip
          python -m pip install paddlepaddle paddleocr "paddlex[ocr-core]" pyinstaller

      - name: Build PaddleOCR sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources\ocr | Out-Null
          python -m PyInstaller `
            --clean `
            --onefile `
            --name paddleocr-sidecar `
            --collect-all paddle `
            --collect-all paddleocr `
            --collect-all paddlex `
            --copy-metadata paddleocr `
            --copy-metadata paddlepaddle `
            --copy-metadata paddlex `
            --copy-metadata imagesize `
            --copy-metadata opencv-contrib-python `
            --copy-metadata pyclipper `
            --copy-metadata pypdfium2 `
            --copy-metadata python-bidi `
            --copy-metadata shapely `
            --distpath resources\ocr `
            --workpath .offline-build\paddleocr-sidecar\work `
            --specpath .offline-build\paddleocr-sidecar\spec `
            scripts\ocr-sidecar\paddleocr_sidecar.py
          if (-not (Test-Path "resources\ocr\paddleocr-sidecar.exe")) {
            throw "Missing resources\ocr\paddleocr-sidecar.exe"
          }

      - name: Warm OCR models and smoke test
        shell: pwsh
        run: |
          @'
          from PIL import Image, ImageDraw, ImageFont
          path = "ocr-smoke.png"
          image = Image.new("RGB", (900, 260), "white")
          draw = ImageDraw.Draw(image)
          font_path = r"C:\Windows\Fonts\arial.ttf"
          try:
              font = ImageFont.truetype(font_path, 96)
          except Exception:
              font = ImageFont.load_default()
          draw.text((40, 70), "test 123", fill="black", font=font)
          image.save(path)
          '@ | python -

          $sidecar = Resolve-Path "resources\ocr\paddleocr-sidecar.exe"
          $smoke = Resolve-Path "ocr-smoke.png"

          $warmOutput = & $sidecar $smoke
          $warmExit = $LASTEXITCODE
          if ($warmOutput) {
            Write-Host $warmOutput
          }
          if ($warmExit -ne 0) {
            Write-Warning "Initial OCR warm-up exited with code $warmExit; continuing only if the model cache was created."
          }

          # 若模型落在默认用户目录（例如未走 frozen 路径时），同步到随包目录
          $models = "resources\ocr\.paddlex\official_models"
          $userModels = Join-Path $env:USERPROFILE ".paddlex\official_models"
          if ((Test-Path $userModels) -and (-not (Test-Path $models))) {
            New-Item -ItemType Directory -Force -Path "resources\ocr\.paddlex" | Out-Null
            Copy-Item $userModels $models -Recurse -Force
          }

          if (-not (Test-Path $models)) {
            throw "Missing OCR model cache at $models"
          }

          $tempProfile = Join-Path $env:RUNNER_TEMP "ocr-empty-profile"
          New-Item -ItemType Directory -Force -Path $tempProfile | Out-Null
          $oldHome = $env:HOME
          $oldUserProfile = $env:USERPROFILE
          try {
            $env:HOME = $tempProfile
            $env:USERPROFILE = $tempProfile
            $output = & $sidecar $smoke
            $smokeExit = $LASTEXITCODE
            $parsed = $output | ConvertFrom-Json
            if ($smokeExit -ne 0) {
              Write-Warning "OCR smoke test exited with code $smokeExit; continuing because JSON output was valid and model cache exists."
            }
            if (-not $parsed.text) {
              Write-Warning "OCR smoke test returned empty text; continuing because the sidecar ran and model cache exists."
            }
          } finally {
            $env:HOME = $oldHome
            $env:USERPROFILE = $oldUserProfile
          }
          $global:LASTEXITCODE = 0

      - name: Verify offline resources
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\prepare-offline-resources.ps1

      - name: Build frontend
        shell: pwsh
        run: npm run build

      - name: Check Rust backend
        shell: pwsh
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri Windows installer
        shell: pwsh
        env:
          # Optional signing placeholders for future use:
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CI: "true"
        run: npm run tauri build -- --target x86_64-pc-windows-msvc --bundles nsis

      - name: Collect distributables
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          # 使用 --target x86_64-pc-windows-msvc 时产物在三元组目录下（当前 workflow）
          $triple = "src-tauri\target\x86_64-pc-windows-msvc\release"
          $plain = "src-tauri\target\release"
          Copy-Item "$triple\bundle\nsis\*.exe" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "$triple\bundle\msi\*.msi" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "$triple\*.exe" artifacts\ -ErrorAction SilentlyContinue
          # 若将来去掉 --target，可回落到默认 release 目录
          Copy-Item "$plain\bundle\nsis\*.exe" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "$plain\bundle\msi\*.msi" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "$plain\*.exe" artifacts\ -ErrorAction SilentlyContinue
          if (-not (Get-ChildItem artifacts -File)) {
            throw "No Windows distributables found"
          }
          Get-ChildItem artifacts -File | Format-Table Name, Length

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-case-wiki-windows-x64
          path: artifacts/*
          if-no-files-found: error

  # Future matrix candidates:
  # - macos-latest: build DMG with resources/pdfium/libpdfium.dylib and macOS sidecar.
  # - ubuntu-latest: build deb/appimage with resources/pdfium/libpdfium.so and Linux sidecar.
