name: Package Windows and UOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x64
            pdfium_platform: win-x64
            tauri_args: --target x86_64-pc-windows-msvc --bundles nsis
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: uos-linux-x64
            pdfium_platform: linux-x64
            tauri_args: --target x86_64-unknown-linux-gnu --bundles deb,appimage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install protoc -y

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            protobuf-compiler
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev

      - name: Install dependencies
        run: npm ci

      - name: Fetch PDFium dynamic library
        shell: bash
        run: ./scripts/fetch-pdfium.sh ${{ matrix.pdfium_platform }}

      - name: Build Tauri app (tag release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "案件知识库 ${{ github.ref_name }}"
          releaseBody: "自动构建产物：Windows(.exe) 与 UOS(.AppImage/.deb)"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}

      - name: Build Tauri app (manual run)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.tauri_args }}

      - name: Collect distributables
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp -v src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe dist/
          else
            cp -v src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage dist/ || true
            cp -v src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb dist/ || true
          fi

      - name: Upload distributable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.artifact_name }}
          path: dist
          if-no-files-found: error
